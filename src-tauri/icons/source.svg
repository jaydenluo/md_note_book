<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#1B2230"/>
      <stop offset="0.6" stop-color="#0A0E14"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="55%" r="78%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.62" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="highlight" cx="28%" cy="24%" r="48%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#FFFFFF" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFFFFF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#highlight)"/>
  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#vignette)"/>

  <g filter="url(#shadow)">
    <g filter="url(#glow)" transform="translate(0, 10)">
      <path d="M 300 720 C 300 560 300 420 330 340 C 360 260 450 260 512 380 C 574 260 664 260 694 340 C 724 420 724 560 724 720" fill="none" stroke="#FFFFFF" stroke-width="96" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 300 720 C 300 560 300 420 330 340 C 360 260 450 260 512 380 C 574 260 664 260 694 340 C 724 420 724 560 724 720" fill="none" stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
